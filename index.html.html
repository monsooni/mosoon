              <span class="inline-flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-600 inline-block"></span>세부 지점</span>
            </div>
          </div>

        </section>
      </main>
    </div>
  </div>

  <section id="print-area" class="hidden bg-white text-slate-950 p-0">
    <div id="print-content"></div>
  </section>

  <script>
    const DATA = JSON.parse(document.getElementById('app-data').textContent);
    const itineraryData = DATA.itineraryData;
    const preparationSections = DATA.preparationSections;
    const allMapData = DATA.allMapData;

    const typeMeta = {
      important: { label: '중요', icon: 'alert-triangle', cls: 'bg-red-50 text-red-700 border-red-200' },
      flight: { label: '항공', icon: 'plane', cls: 'bg-sky-50 text-sky-700 border-sky-200' },
      transfer: { label: '이동', icon: 'bus', cls: 'bg-slate-50 text-slate-700 border-slate-200' },
      meal: { label: '식사', icon: 'utensils', cls: 'bg-orange-50 text-orange-700 border-orange-200' },
      seminar: { label: '세미나', icon: 'graduation-cap', cls: 'bg-indigo-50 text-indigo-700 border-indigo-200' },
      workshop: { label: '워크샵', icon: 'users-round', cls: 'bg-purple-50 text-purple-700 border-purple-200' },
      official: { label: '공식', icon: 'landmark', cls: 'bg-blue-50 text-blue-700 border-blue-200' },
      field: { label: '탐방', icon: 'map-pinned', cls: 'bg-emerald-50 text-emerald-700 border-emerald-200' },
      hotel: { label: '숙소', icon: 'bed', cls: 'bg-violet-50 text-violet-700 border-violet-200' }
    };

    let state = {
      selectedDay: getInitialDay(),
      isSidebarOpen: window.innerWidth >= 640,
      isShowingAllMap: false,
      query: '',
      lastBounds: null,
      activePointIndex: null,
      activePointIndexes: [],
      mobilePanel: 'schedule',
      focusedMapTitle: ''
    };

    let map = null;
    let currentPolyline = null;
    let currentMarkers = [];

    const els = {
      sidebar: document.getElementById('sidebar'),
      toggleSidebar: document.getElementById('toggle-sidebar'),
      closeSidebar: document.getElementById('close-sidebar-btn'),
      overlay: document.getElementById('sidebar-overlay'),
      itineraryList: document.getElementById('itinerary-list'),
      searchInput: document.getElementById('search-input'),
      clearSearch: document.getElementById('clear-search'),
      searchCount: document.getElementById('search-count'),
      detailDay: document.getElementById('detail-day'),
      detailDate: document.getElementById('detail-date'),
      detailTitle: document.getElementById('detail-title'),
      detailSummary: document.getElementById('detail-summary'),
      currentBadge: document.getElementById('current-badge'),
      learningCards: document.getElementById('learning-cards'),
      timelineList: document.getElementById('timeline-list'),
      scheduleCount: document.getElementById('schedule-count'),
      mapTitle: document.getElementById('map-title'),
      showAllMapBtn: document.getElementById('show-all-map-btn'),
      fitMapBtn: document.getElementById('fit-map-btn'),
      mapFallback: document.getElementById('map-fallback'),
      mapEl: document.getElementById('map'),
      schedulePanel: document.getElementById('schedule-panel'),
      mapPanel: document.getElementById('map-panel'),
      mobileScheduleTab: document.getElementById('mobile-schedule-tab'),
      mobileMapTab: document.getElementById('mobile-map-tab'),
      mapToScheduleBtn: document.getElementById('map-to-schedule-btn'),
      mapFocusCard: document.getElementById('map-focus-card'),
      mapFocusTitle: document.getElementById('map-focus-title'),
      focusCardBackBtn: document.getElementById('focus-card-back-btn'),
      todayBtn: document.getElementById('today-btn'),
      printBtn: document.getElementById('print-btn'),
      printContent: document.getElementById('print-content')
    };

    function getInitialDay() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const iso = `${yyyy}-${mm}-${dd}`;
      const match = itineraryData.find(item => item.isoDate === iso);
      return match ? match.day : 1;
    }

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (typeof text !== 'undefined' && text !== null) node.textContent = text;
      return node;
    }

    function icon(name, className) {
      const node = document.createElement('i');
      node.setAttribute('data-lucide', name);
      if (className) node.className = className;
      return node;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function normalize(value) {
      return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }

    function dayText(day) {
      return normalize([
        day.title,
        day.date,
        day.summary,
        ...(day.locations || []),
        ...(day.notices || []),
        ...(day.schedule || []).flatMap(item => [item.time, item.desc, ...(item.details || [])])
      ].join(' '));
    }

    function filteredDays() {
      const q = normalize(state.query);
      if (!q) return itineraryData;
      return itineraryData.filter(day => dayText(day).includes(q));
    }

    function isMobileLayout() {
      return window.innerWidth < 1024;
    }

    function applyMobilePanelState() {
      const mobile = isMobileLayout();
      if (!els.schedulePanel || !els.mapPanel) return;
      // v5: 모바일에서도 일정과 지도를 동시에 보이게 유지합니다.
      els.schedulePanel.classList.remove('hidden');
      els.schedulePanel.classList.add('flex');
      els.mapPanel.classList.remove('hidden');
      els.mapPanel.classList.add('flex');
      if (els.mobileScheduleTab) els.mobileScheduleTab.classList.add('active');
      if (els.mobileMapTab) els.mobileMapTab.classList.remove('active');
      setTimeout(() => { if (map) map.invalidateSize(); }, mobile ? 120 : 80);
    }

    function switchMobilePanel(panel) {
      state.mobilePanel = panel === 'map' ? 'map' : 'schedule';
      applyMobilePanelState();
      if (state.mobilePanel === 'map') {
        setTimeout(() => {
          if (map) {
            map.invalidateSize();
            if (state.activePointIndexes && state.activePointIndexes.length) focusMapTargets(state.activePointIndexes);
            else if (state.lastBounds) map.fitBounds(state.lastBounds, { padding: [36, 36] });
          }
        }, 150);
      }
    }

    function setMapFocusTitle(text) {
      state.focusedMapTitle = text || '';
      if (!els.mapFocusCard || !els.mapFocusTitle) return;
      if (state.focusedMapTitle) {
        els.mapFocusTitle.textContent = state.focusedMapTitle;
        els.mapFocusCard.classList.remove('hidden');
      } else {
        els.mapFocusCard.classList.add('hidden');
      }
    }

    function applySidebarState() {
      const open = state.isSidebarOpen;
      els.sidebar.classList.toggle('-translate-x-full', !open);
      els.sidebar.classList.toggle('translate-x-0', open);
      els.sidebar.classList.toggle('sm:w-0', !open);
      els.sidebar.classList.toggle('sm:max-w-0', !open);
      els.sidebar.classList.toggle('sm:w-80', open);
      els.sidebar.classList.toggle('overflow-hidden', !open);
      const shouldShowOverlay = open && window.innerWidth < 640;
      els.overlay.classList.toggle('hidden', !shouldShowOverlay);
      setTimeout(() => { if (map) map.invalidateSize(); }, 320);
    }

    function toggleSidebar(force) {
      if (typeof force === 'boolean') state.isSidebarOpen = force;
      else state.isSidebarOpen = !state.isSidebarOpen;
      applySidebarState();
    }

    function renderSidebar() {
      const days = filteredDays();
      els.itineraryList.innerHTML = '';
      els.searchCount.textContent = state.query ? `${days.length}개 날짜가 검색되었습니다.` : '9일 전체 일정';
      els.clearSearch.classList.toggle('hidden', !state.query);

      if (days.length === 0) {
        const empty = el('div', 'p-6 text-center text-sm text-slate-500 font-semibold', '검색 결과가 없습니다.');
        els.itineraryList.appendChild(empty);
        return;
      }

      days.forEach(item => {
        const isSelected = state.selectedDay === item.day;
        const button = el('button', 'w-full text-left px-4 py-3 border-b border-slate-100 transition-all flex items-start gap-3 border-l-4 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-200');
        button.type = 'button';
        button.classList.add(isSelected ? 'bg-blue-50' : 'hover:bg-slate-50');
        button.classList.add(isSelected ? 'border-l-blue-600' : 'border-l-transparent');

        const dayBadge = el('div', 'shrink-0 w-10 h-10 rounded-2xl flex flex-col items-center justify-center border font-black');
        dayBadge.classList.add(isSelected ? 'bg-blue-600' : 'bg-slate-100');
        dayBadge.classList.add(isSelected ? 'text-white' : 'text-slate-600');
        dayBadge.classList.add(isSelected ? 'border-blue-600' : 'border-slate-200');
        dayBadge.appendChild(el('span', 'text-[10px] leading-none', 'DAY'));
        dayBadge.appendChild(el('span', 'text-lg leading-none', String(item.day)));

        const body = el('div', 'min-w-0 flex-1');
        const date = el('div', 'text-xs font-bold mb-0.5');
        date.classList.add(isSelected ? 'text-blue-700' : 'text-slate-500');
        date.textContent = item.date + ' · ' + item.locations.join(' → ');
        const title = el('div', 'text-sm font-black truncate');
        title.classList.add(isSelected ? 'text-blue-950' : 'text-slate-800');
        title.textContent = item.title;
        const summary = el('p', 'text-xs text-slate-500 leading-snug mt-1 line-clamp-2', item.summary);
        const importantCount = item.schedule.filter(s => s.type === 'important' || s.type === 'flight').length;
        const chips = el('div', 'mt-2 flex flex-wrap gap-1');
        if (importantCount > 0) {
          chips.appendChild(el('span', 'inline-flex items-center rounded-full bg-red-50 border border-red-100 px-2 py-0.5 text-[10px] font-black text-red-700', `중요 ${importantCount}`));
        }
        chips.appendChild(el('span', 'inline-flex items-center rounded-full bg-slate-50 border border-slate-200 px-2 py-0.5 text-[10px] font-black text-slate-500', `${item.schedule.length}개 일정`));
        body.append(date, title, summary, chips);
        button.append(dayBadge, body);
        button.addEventListener('click', () => {
          state.selectedDay = item.day;
          state.isShowingAllMap = false;
          state.activePointIndex = null;
          state.activePointIndexes = [];
          updateDashboard();
          renderSidebar();
          switchMobilePanel('schedule');
          if (window.innerWidth < 640) toggleSidebar(false);
        });
        els.itineraryList.appendChild(button);
      });
      if (window.lucide) lucide.createIcons();
    }

    function renderLearningCards(data) {
      els.learningCards.innerHTML = '';
      if (!(data.notices && data.notices.length)) return;

      const wrap = el('article', 'rounded-2xl border border-slate-200 bg-slate-50 text-slate-800 p-3');
      const h = el('h4', 'font-black text-sm flex items-center gap-1.5 mb-1');
      h.append(icon('badge-alert', 'w-4 h-4 shrink-0'), document.createTextNode('준비물·주의사항'));
      const p = el('p', 'text-sm leading-relaxed font-medium', data.notices.join(' · '));
      wrap.append(h, p);
      els.learningCards.appendChild(wrap);
    }

    function getDetailText(detail) {
      if (typeof detail === 'string') return detail;
      if (detail && typeof detail === 'object') return detail.text || detail.label || '';
      return '';
    }

    function itemMapIndexes(item, data) {
      const points = data.mapPoints || [];
      if (Array.isArray(item.mapPointIndexes)) {
        return item.mapPointIndexes.filter(index => Number.isInteger(index) && points[index]);
      }
      const pointIndex = Number.isInteger(item.mapPointIndex) ? item.mapPointIndex : null;
      return pointIndex !== null && points[pointIndex] ? [pointIndex] : [];
    }

    function renderTimeline(data) {
      els.timelineList.innerHTML = '';
      els.scheduleCount.textContent = `${data.schedule.length}개 일정`;
      data.schedule.forEach(item => {
        const meta = typeMeta[item.type] || { label: item.type || '일정', icon: 'circle', cls: 'bg-slate-50 text-slate-700 border-slate-200' };
        const pointIndexes = itemMapIndexes(item, data);
        const isMapLinked = pointIndexes.length > 0;
        const isActive = isMapLinked && !state.isShowingAllMap && pointIndexes.includes(state.activePointIndex);
        const row = el('article', 'flex gap-3 sm:gap-4 items-start relative pl-0 avoid-break rounded-2xl transition-colors');
        if (isMapLinked) {
          row.classList.add('cursor-pointer', 'hover:bg-slate-50', 'focus:outline-none', 'focus:ring-2', 'focus:ring-blue-200', 'p-3', 'sm:p-2', '-m-2', 'touch-manipulation');
          row.tabIndex = 0;
          row.setAttribute('role', 'button');
          row.setAttribute('title', pointIndexes.length > 1 ? '클릭하면 지도에서 이 일정의 세부 지점 전체를 보여줍니다.' : '클릭하면 지도에서 해당 지점을 가운데로 이동합니다.');
          row.setAttribute('aria-label', `${item.time} ${item.desc} 지도에서 보기`);
          if (isActive) row.classList.add('bg-blue-50');
          const activate = () => focusScheduleIndexes(pointIndexes);
          row.addEventListener('click', activate);
          row.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              activate();
            }
          });
        }

        const dot = el('div', 'relative z-10 bg-white p-1 rounded-full mt-1 shrink-0');
        const dotInner = el('div', 'w-9 h-9 sm:w-8 sm:h-8 rounded-full flex items-center justify-center border-2 shadow-sm');
        dotInner.className += item.type === 'important' || item.type === 'flight' ? ' bg-red-50 border-red-300 text-red-600' : ' bg-blue-50 border-blue-200 text-blue-600';
        dotInner.appendChild(icon(meta.icon, 'w-4 h-4'));
        dot.appendChild(dotInner);

        const body = el('div', 'flex-1 pb-3 min-w-0');
        const top = el('div', 'flex items-center gap-1.5 sm:gap-2 flex-wrap mb-1.5');
        top.appendChild(el('span', 'inline-block bg-slate-100 text-slate-700 text-xs font-black px-2.5 py-1 rounded-lg border border-slate-200', item.time));
        const badge = el('span', `inline-flex items-center gap-1 text-[11px] font-black px-2 py-1 rounded-lg border ${meta.cls}`);
        badge.append(icon(meta.icon, 'w-3 h-3'), document.createTextNode(meta.label));
        top.appendChild(badge);
        if (isMapLinked) {
          const mapBadge = el('span', 'inline-flex items-center gap-1 text-[11px] font-black px-2 py-1 rounded-lg border bg-blue-50 text-blue-700 border-blue-100');
          mapBadge.append(icon('map-pin', 'w-3 h-3'), document.createTextNode(pointIndexes.length > 1 ? `지도 ${pointIndexes.length}곳` : '지도 보기'));
          top.appendChild(mapBadge);
        }
        const desc = el('p', 'text-slate-900 text-base font-black leading-snug', item.desc);
        body.append(top, desc);

        if (item.details && item.details.length) {
          const ul = el('ul', 'mt-2 space-y-1.5');
          item.details.forEach(detail => {
            const detailText = getDetailText(detail);
            if (!detailText) return;
            const detailPointIndex = detail && typeof detail === 'object' && Number.isInteger(detail.mapPointIndex) ? detail.mapPointIndex : null;
            const detailLinked = detailPointIndex !== null && data.mapPoints && data.mapPoints[detailPointIndex];
            const li = el('li', detailLinked
              ? 'text-sm text-slate-700 font-bold flex items-start gap-1.5 leading-snug pl-4 ml-1 border-l-2 border-blue-200 bg-blue-50/60 rounded-xl px-3 py-2.5 sm:px-2 sm:py-1.5 cursor-pointer hover:bg-blue-100 focus:outline-none focus:ring-2 focus:ring-blue-200 touch-manipulation'
              : 'text-sm text-slate-600 font-medium flex items-start gap-1.5 leading-snug');
            if (detailLinked) {
              li.tabIndex = 0;
              li.setAttribute('role', 'button');
              li.setAttribute('title', '클릭하면 지도에서 이 세부 지점을 가운데로 이동합니다.');
              const activateDetail = event => {
                event.stopPropagation();
                focusSchedulePoint(detailPointIndex);
              };
              li.addEventListener('click', activateDetail);
              li.addEventListener('keydown', event => {
                if (event.key === 'Enter' || event.key === ' ') {
                  event.preventDefault();
                  event.stopPropagation();
                  focusSchedulePoint(detailPointIndex);
                }
              });
              li.append(icon('corner-down-right', 'w-4 h-4 mt-0.5 text-blue-500 shrink-0'), el('span', 'flex-1', detailText));
              const smallBadge = el('span', 'shrink-0 inline-flex items-center gap-1 text-[10px] font-black px-1.5 py-0.5 rounded-md border bg-white text-blue-700 border-blue-100');
              smallBadge.append(icon('map-pin', 'w-3 h-3'), document.createTextNode('세부'));
              li.appendChild(smallBadge);
            } else {
              li.append(icon('check', 'w-4 h-4 mt-0.5 text-blue-400 shrink-0'), el('span', '', detailText));
            }
            ul.appendChild(li);
          });
          body.appendChild(ul);
        }
        row.append(dot, body);
        els.timelineList.appendChild(row);
      });
    }

    function updateDashboard() {
      const data = itineraryData.find(d => d.day === state.selectedDay) || itineraryData[0];
      els.detailDay.textContent = `Day ${data.day}`;
      els.detailDate.textContent = data.date;
      els.detailTitle.textContent = data.title;
      els.detailSummary.textContent = data.summary;
      const todayIso = new Date().toISOString().slice(0, 10);
      els.currentBadge.classList.toggle('hidden', data.isoDate !== todayIso);
      renderLearningCards(data);
      renderTimeline(data);
      els.mapTitle.textContent = state.isShowingAllMap ? '독일 연수 전체 동선' : `Day ${data.day} 세부 동선`;
      els.showAllMapBtn.classList.toggle('bg-blue-600', state.isShowingAllMap);
      els.showAllMapBtn.classList.toggle('text-white', state.isShowingAllMap);
      els.showAllMapBtn.classList.toggle('border-blue-600', state.isShowingAllMap);
      els.showAllMapBtn.querySelector('span').textContent = state.isShowingAllMap ? '일자 동선' : '전체 동선';
      renderMap();
      applyMobilePanelState();
      if (window.lucide) lucide.createIcons();
    }

    function initMap() {
      if (typeof L === 'undefined') {
        els.mapFallback.textContent = '지도 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해 주세요.';
        els.mapFallback.classList.remove('hidden');
        return;
      }
      map = L.map('map', { zoomControl: true }).setView([52.5200, 13.4050], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
      }).addTo(map);
      renderMap();
    }

    function currentPoints() {
      const data = itineraryData.find(d => d.day === state.selectedDay) || itineraryData[0];
      return state.isShowingAllMap ? allMapData : (data.mapPoints || []);
    }

    function clearMap() {
      if (currentPolyline) map.removeLayer(currentPolyline);
      currentMarkers.forEach(marker => map.removeLayer(marker));
      currentPolyline = null;
      currentMarkers = [];
      state.lastBounds = null;
    }

    function renderMap() {
      if (!map) return;
      clearMap();
      const points = currentPoints();
      if (!points.length) {
        els.mapFallback.classList.remove('hidden');
        els.mapEl.classList.add('invisible');
        return;
      }
      els.mapFallback.classList.add('hidden');
      els.mapEl.classList.remove('invisible');
      const latlngs = points.map(p => [p.lat, p.lng]);
      currentPolyline = L.polyline(latlngs, {
        color: state.isShowingAllMap ? '#0f172a' : '#2563eb',
        weight: state.isShowingAllMap ? 3 : 4,
        opacity: 0.82,
        dashArray: state.isShowingAllMap ? '10, 8' : '8, 8'
      }).addTo(map);
      points.forEach((p, index) => {
        const isSubPoint = !state.isShowingAllMap && p.level === 'sub';
        const isActivePoint = !state.isShowingAllMap && state.activePointIndex === index;
        const markerColor = state.isShowingAllMap ? '#ef4444' : (isActivePoint ? '#16a34a' : (isSubPoint ? '#2563eb' : '#ef4444'));
        const markerSize = isActivePoint ? 32 : (isSubPoint ? 22 : 28);
        const fontSize = isSubPoint && !isActivePoint ? 11 : 12;
        const border = isActivePoint ? '3px solid #bbf7d0' : '2px solid white';
        const customIcon = L.divIcon({
          className: 'custom-pin',
          html: '<div style="background-color: ' + markerColor + '; color: white; width: ' + markerSize + 'px; height: ' + markerSize + 'px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: ' + fontSize + 'px; border: ' + border + '; box-shadow: 0 2px 8px rgba(0,0,0,0.32);">' + (index + 1) + '</div>',
          iconSize: [markerSize, markerSize],
          iconAnchor: [markerSize / 2, markerSize / 2]
        });
        const markerType = state.isShowingAllMap ? '전체 동선' : (isSubPoint ? '세부 지점' : '주요 지점');
        const popup = '<b style="font-size:14px;">' + (index + 1) + '. ' + escapeHTML(p.label) + '</b><br><span style="font-size:12px;color:#475569;">' + markerType + '</span>';
        const marker = L.marker([p.lat, p.lng], { icon: customIcon }).addTo(map).bindPopup(popup);
        currentMarkers.push(marker);
      });
      if (latlngs.length > 1) {
        state.lastBounds = L.latLngBounds(latlngs);
        map.fitBounds(state.lastBounds, { padding: [42, 42] });
      } else {
        map.setView(latlngs[0], 14);
      }
      setTimeout(() => map.invalidateSize(), 250);
    }

    function focusMapPoint(pointIndex) {
      if (!map) return;
      const points = currentPoints();
      if (!Number.isInteger(pointIndex) || !points[pointIndex]) return;
      const point = points[pointIndex];
      setMapFocusTitle(point.label);
      const targetZoom = Math.max(map.getZoom(), 14);
      map.setView([point.lat, point.lng], targetZoom, { animate: true });
      const marker = currentMarkers[pointIndex];
      if (marker) marker.openPopup();
      setTimeout(() => map.invalidateSize(), 120);
    }

    function focusMapTargets(pointIndexes) {
      if (!map) return;
      const points = currentPoints();
      const validIndexes = (pointIndexes || []).filter(index => Number.isInteger(index) && points[index]);
      if (!validIndexes.length) return;
      if (validIndexes.length === 1) {
        focusMapPoint(validIndexes[0]);
        return;
      }
      setMapFocusTitle(`선택한 일정의 ${validIndexes.length}개 지점`);
      const latlngs = validIndexes.map(index => [points[index].lat, points[index].lng]);
      const bounds = L.latLngBounds(latlngs);
      map.fitBounds(bounds, { padding: [46, 46], animate: true });
      const marker = currentMarkers[validIndexes[0]];
      if (marker) marker.openPopup();
      setTimeout(() => map.invalidateSize(), 120);
    }

    function focusScheduleIndexes(pointIndexes) {
      const validIndexes = (pointIndexes || []).filter(Number.isInteger);
      if (!validIndexes.length) return;
      state.isShowingAllMap = false;
      state.activePointIndex = validIndexes[0];
      state.activePointIndexes = validIndexes;
      updateDashboard();
      applyMobilePanelState();
      setTimeout(() => focusMapTargets(validIndexes), isMobileLayout() ? 180 : 80);
    }

    function focusSchedulePoint(pointIndex) {
      focusScheduleIndexes([pointIndex]);
    }

    function renderPrintSection() {
      const root = els.printContent;
      root.innerHTML = '';
      const header = el('div', 'mb-6 border-b-4 border-blue-900 pb-3');
      header.appendChild(el('h1', 'text-2xl font-black', '2026 교사 독일통일 연수 스마트 일정표'));
      header.appendChild(el('p', 'text-sm font-bold text-slate-600 mt-1', '재단법인 통일과나눔 주관 | 2026.07.27 - 08.04'));
      header.appendChild(el('p', 'text-xs text-red-600 font-bold mt-2', '※ 구체적인 일정은 현지 상황에 따라 조정될 수 있습니다.'));
      root.appendChild(header);

      itineraryData.forEach((day, dayIndex) => {
        const section = el('section', 'avoid-break mb-5');
        if (dayIndex > 0 && dayIndex % 3 === 0) section.classList.add('print-break');
        const h = el('h2', 'text-lg font-black bg-slate-100 border border-slate-300 px-3 py-2 mb-2', `Day ${day.day} · ${day.date} · ${day.title}`);
        section.appendChild(h);
        section.appendChild(el('p', 'text-sm font-bold text-blue-800 mb-2', day.summary));
        const table = el('table', 'w-full border-collapse text-xs mb-3');
        const thead = document.createElement('thead');
        const hr = document.createElement('tr');
        ['시간', '내용', '구분'].forEach(text => {
          const th = el('th', 'border border-slate-400 bg-slate-200 px-2 py-1 text-left', text);
          hr.appendChild(th);
        });
        thead.appendChild(hr);
        const tbody = document.createElement('tbody');
        day.schedule.forEach(item => {
          const tr = document.createElement('tr');
          const details = item.details && item.details.length ? ' - ' + item.details.map(getDetailText).filter(Boolean).join(' / ') : '';
          const cells = [item.time, item.desc + details, (typeMeta[item.type] || {label: item.type || '일정'}).label];
          cells.forEach(text => tr.appendChild(el('td', 'border border-slate-300 px-2 py-1 align-top', text)));
          tbody.appendChild(tr);
        });
        table.append(thead, tbody);
        section.appendChild(table);
        root.appendChild(section);
      });

      const prep = el('section', 'print-break');
      prep.appendChild(el('h2', 'text-xl font-black mb-3', '연수 준비 사항'));
      preparationSections.forEach(sec => {
        const box = el('div', 'avoid-break mb-3');
        box.appendChild(el('h3', 'text-base font-black bg-slate-100 border border-slate-300 px-3 py-2', sec.title));
        const ul = el('ul', 'list-disc pl-6 py-2 text-sm space-y-1');
        sec.items.forEach(item => ul.appendChild(el('li', '', item)));
        box.appendChild(ul);
        prep.appendChild(box);
      });
      root.appendChild(prep);
    }

    function moveToToday() {
      const day = getInitialDay();
      state.selectedDay = day;
      state.isShowingAllMap = false;
      state.activePointIndex = null;
      state.activePointIndexes = [];
      updateDashboard();
      renderSidebar();
    }

    function bindEvents() {
      els.toggleSidebar.addEventListener('click', () => toggleSidebar());
      els.closeSidebar.addEventListener('click', () => toggleSidebar(false));
      els.overlay.addEventListener('click', () => toggleSidebar(false));
      els.mobileScheduleTab?.addEventListener('click', () => switchMobilePanel('schedule'));
      els.mobileMapTab?.addEventListener('click', () => switchMobilePanel('map'));
      els.mapToScheduleBtn?.addEventListener('click', () => switchMobilePanel('schedule'));
      els.focusCardBackBtn?.addEventListener('click', () => switchMobilePanel('schedule'));
      els.searchInput.addEventListener('input', event => {
        state.query = event.target.value;
        renderSidebar();
      });
      els.clearSearch.addEventListener('click', () => {
        state.query = '';
        els.searchInput.value = '';
        renderSidebar();
        els.searchInput.focus();
      });
      els.showAllMapBtn.addEventListener('click', () => {
        state.isShowingAllMap = !state.isShowingAllMap;
        state.activePointIndex = null;
        state.activePointIndexes = [];
        setMapFocusTitle(state.isShowingAllMap ? '독일 연수 전체 동선' : '일자별 동선');
        if (isMobileLayout()) state.mobilePanel = 'map';
        updateDashboard();
        if (isMobileLayout()) switchMobilePanel('map');
      });
      els.fitMapBtn.addEventListener('click', () => {
        if (!map) return;
        if (state.lastBounds) map.fitBounds(state.lastBounds, { padding: [42, 42] });
        else renderMap();
      });
      els.todayBtn.addEventListener('click', moveToToday);
      els.printBtn.addEventListener('click', () => {
        renderPrintSection();
        window.print();
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth >= 640 && !state.isSidebarOpen) {
          // PC에서는 사용자가 닫은 상태를 유지하되 오버레이만 제거
          els.overlay.classList.add('hidden');
        } else {
          applySidebarState();
        }
        applyMobilePanelState();
        setTimeout(() => { if (map) map.invalidateSize(); }, 120);
      });
      window.addEventListener('keydown', event => {
        if (event.key === 'Escape' && window.innerWidth < 640 && state.isSidebarOpen) toggleSidebar(false);
        if (event.key === '/' && document.activeElement !== els.searchInput) {
          event.preventDefault();
          if (!state.isSidebarOpen) toggleSidebar(true);
          els.searchInput.focus();
        }
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) lucide.createIcons();
      bindEvents();
      applySidebarState();
      applyMobilePanelState();
      renderSidebar();
      renderPrintSection();
      initMap();
      updateDashboard();
    });
  </script>
</body>
</html>
